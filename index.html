<!DOCTYPE html>
<html>
<head>
<title>Bill Splitter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h1>Bill Splitter</h1>

<div class="row">
<label>Total Bill ($)</label>
<input type="text" id="total" placeholder="0.00">
</div>

<div class="row">
<label>Number of People</label>
<input type="text" id="people" placeholder="2">
</div>

<div class="row">
<label>Tip %</label>
<input type="text" id="tip" placeholder="15">
</div>

<hr>

<p style="font-size:13px;color:#777777;">Or add items below (this will be used instead of the total above):</p>

<div id="items">
<div class="itemrow">
<input type="text" class="itemname" placeholder="Item name">
<input type="text" class="itemamount" placeholder="0.00">
</div>
</div>

<button onclick="addItem()">Add Item</button>

<button onclick="splitBill()">Split</button>

<div id="results"></div>

</div>

<script src="app.js"></script>
</body>
</html>
