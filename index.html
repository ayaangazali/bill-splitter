<!DOCTYPE html>
<html>
<head>
<title>Bill Splitter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h1>Bill Splitter</h1>

<div class="row">

</div>

<script src="app.js"></script>
</body>
</html>
